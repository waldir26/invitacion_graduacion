<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Graduación - Marlin</title>
    <style>
        :root {
            --brillo-cinta: linear-gradient(to bottom, #d4af37 0%, #f9f4d2 50%, #aa8939 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
        }

        .fondo-pantalla {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
        }

        .escenario {
            perspective: 1500px;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .escenario {
                transform: scale(0.95);
            }
        }

        .tarjeta {
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            display: inline-block;
            background: transparent;
            /* Sin fondo negro */
        }

        /* Contenedor de la imagen principal */
        .imagen-container {
            position: relative;
            display: inline-block;
            line-height: 0;
        }

        /* La imagen de invitación se ve COMPLETA y ocupa su tamaño natural */
        .invitacion-img {
            display: block;
            width: auto;
            height: auto;
            max-width: 92vw;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Solapa negra con su propia imagen de fondo */
        .solapa-negra {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background-color: #000;
            background-image: url('image_8ea266.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10;
            transform-origin: left;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Cinta y moño */
        .capa-liston-completa {
            position: absolute;
            top: 45%;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 20;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cinta-horizontal {
            position: absolute;
            width: 100%;
            height: 18px;
            background: var(--brillo-cinta);
            z-index: 21;
        }

        .mono-contenedor {
            position: absolute;
            left: 25%;
            transform: translateX(-50%);
            width: 60%;
            z-index: 25;
        }

        .mono-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.5));
        }

        .remover-todo {
            transform: translateX(-150%) rotate(-5deg);
            opacity: 0;
        }

        .tarjeta.abierta .solapa-negra {
            transform: rotateY(-115deg);
        }

        .instruccion {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 0.85em;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="fondo-pantalla"></div>

    <div class="escenario">
        <div class="tarjeta" id="invitacionCard" onclick="abrirInvitacion()">
            <div class="imagen-container">
                <!-- Imagen de invitación COMPLETA, tal como es -->
                <img src="invitacion-marlin.png" alt="Invitación" class="invitacion-img" id="imgInvitacion">

                <!-- Solapa negra (se ajustará al tamaño de la imagen) -->
                <div class="solapa-negra" id="solapaNegra"></div>

                <!-- Cinta y moño -->
                <div class="capa-liston-completa" id="miListon">
                    <div class="cinta-horizontal"></div>
                    <div class="mono-contenedor">
                        <img src="mono-flores.png" alt="Moño" class="mono-img">
                    </div>
                </div>
            </div>
            <div class="instruccion">✨ Toca para abrir ✨</div>
        </div>
    </div>

    <script>
        let ejecutado = false;

        function abrirInvitacion() {
            const liston = document.getElementById('miListon');
            const tarjeta = document.getElementById('invitacionCard');

            if (!ejecutado) {
                if (liston) liston.classList.add('remover-todo');
                setTimeout(() => {
                    tarjeta.classList.add('abierta');
                }, 400);
                setTimeout(() => {
                    if (liston) liston.remove();
                }, 1600);
                ejecutado = true;
            } else {
                tarjeta.classList.toggle('abierta');
            }
        }

        // Ajustar la solapa negra al tamaño exacto de la imagen
        function ajustarElementos() {
            const img = document.getElementById('imgInvitacion');
            const solapa = document.getElementById('solapaNegra');
            const liston = document.getElementById('miListon');

            if (img && solapa) {
                const imgWidth = img.offsetWidth;
                const imgHeight = img.offsetHeight;

                solapa.style.width = (imgWidth / 2) + 'px';
                solapa.style.height = imgHeight + 'px';
            }

            // Ajustar posición del listón
            if (img && liston) {
                const imgHeight = img.offsetHeight;
                liston.style.top = (imgHeight * 0.4) + 'px';
            }
        }

        // Ejecutar cuando la imagen cargue y cuando cambie el tamaño de la ventana
        window.addEventListener('load', function() {
            const img = document.getElementById('imgInvitacion');
            if (img.complete) {
                ajustarElementos();
            } else {
                img.addEventListener('load', ajustarElementos);
            }
            window.addEventListener('resize', ajustarElementos);
        });
    </script>

</body>
</html>
