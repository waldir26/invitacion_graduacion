<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Graduación - Marlin</title>
    <style>
        :root {
            --brillo-cinta: linear-gradient(to bottom, #d4af37 0%, #f9f4d2 50%, #aa8939 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .fondo-pantalla {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('fondo.png'); 
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
        }

        /* ESCENARIO - ahora se adapta al tamaño de la imagen */
        .escenario {
            perspective: 1500px;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            padding: 20px;
        }

        /* Media query para pantallas pequeñas */
        @media (max-width: 500px) {
            .escenario {
                transform: scale(0.85);
            }
        }

        @media (max-height: 600px) {
            .escenario {
                transform: scale(0.8);
            }
        }

        .tarjeta {
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            background: transparent;
            display: inline-block;
        }

        /* La imagen se muestra COMPLETA y la tarjeta toma su tamaño real */
        .invitacion-base {
            display: block;
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
        }

        /* Reemplazamos el div con fondo por una imagen real para que se vea completa */
        .invitacion-img {
            display: block;
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 85vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .solapa-negra {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background-color: #000;
            background-image: url('image_8ea266.png'); 
            background-size: cover;
            background-position: left center;
            z-index: 10;
            transform-origin: left;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .capa-liston-completa {
            position: absolute;
            top: 45%;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 20;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .cinta-horizontal {
            position: absolute;
            width: 100%;
            height: 18px;
            background: var(--brillo-cinta);
            z-index: 21;
        }

        .mono-contenedor {
            position: absolute;
            left: 25%;
            transform: translateX(-50%);
            width: 60%;
            z-index: 25;
        }

        .mono-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }

        .remover-todo {
            transform: translateX(-150%) rotate(-5deg);
            opacity: 0;
        }

        .tarjeta.abierta .solapa-negra {
            transform: rotateY(-115deg);
        }

        .instruccion {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: black;
            font-size: 0.8em;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px white;
            background: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="fondo-pantalla"></div>

    <div class="escenario">
        <div class="tarjeta" id="invitacionCard" onclick="abrirInvitacion()">
            
            <!-- Imagen real que se ve COMPLETA, tal como es -->
            <img src="invitacion-marlin.png" alt="Invitación" class="invitacion-img" id="imgInvitacion">

            <div class="capa-liston-completa" id="miListon">
                <div class="cinta-horizontal"></div>
                <div class="mono-contenedor">
                    <img src="mono-flores.png" alt="Moño" class="mono-img">
                </div>
            </div>

            <div class="solapa-negra" id="solapaNegra"></div>

            <div class="instruccion">Toca para abrir</div>
        </div>
    </div>

    <script>
        let ejecutado = false;

        function abrirInvitacion() {
            const liston = document.getElementById('miListon');
            const tarjeta = document.getElementById('invitacionCard');

            if (!ejecutado) {
                liston.classList.add('remover-todo');
                setTimeout(() => {
                    tarjeta.classList.add('abierta');
                }, 400);
                setTimeout(() => {
                    if(liston) liston.remove();
                }, 1600);
                ejecutado = true;
            } else {
                tarjeta.classList.toggle('abierta');
            }
        }

        // Ajustar la solapa negra al tamaño exacto de la imagen
        function ajustarSolapa() {
            const img = document.getElementById('imgInvitacion');
            const solapa = document.getElementById('solapaNegra');
            if (img && solapa) {
                const imgRect = img.getBoundingClientRect();
                const imgWidth = imgRect.width;
                const imgHeight = imgRect.height;
                solapa.style.width = (imgWidth / 2) + 'px';
                solapa.style.height = imgHeight + 'px';
            }
        }

        window.addEventListener('load', function() {
            const img = document.getElementById('imgInvitacion');
            if (img.complete) {
                ajustarSolapa();
            } else {
                img.addEventListener('load', ajustarSolapa);
            }
            window.addEventListener('resize', ajustarSolapa);
        });
    </script>

</body>
</html>
